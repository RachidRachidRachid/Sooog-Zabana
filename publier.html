<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déposer une annonce - SOOG ZABANA</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .publishing-wrapper {
            max-width: 800px;
            margin: 40px auto 80px;
        }
        .publish-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-sm);
        }
        .page-header-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 24px;
        }
        .upload-dashed-box {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .upload-dashed-box:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }
    </style>
</head>
<body>

    <!-- Header Section (Dynamic) -->
    <header></header>

    <main class="container publishing-wrapper">
        <h1 class="page-header-title">Publier une annonce</h1>

        <div class="publish-card">
            <form id="publish-ad-form">
                <!-- Title field -->
                <div class="form-group">
                    <label class="form-label" for="pub-titre">Titre de l'annonce *</label>
                    <input type="text" id="pub-titre" class="form-control" placeholder="Ex: Renault Symbol 1.6 MPI 2015" required>
                    <span style="font-size:0.75rem; color:var(--text-muted);">Soyez clair et précis dans le titre pour optimiser la recherche.</span>
                </div>

                <!-- Categories list selection -->
                <div class="form-group">
                    <label class="form-label" for="pub-categorie">Catégorie *</label>
                    <select id="pub-categorie" class="form-control" required>
                        <option value="" disabled selected>Choisir une catégorie</option>
                    </select>
                </div>

                <!-- Price and details -->
                <div class="form-group">
                    <label class="form-label" for="pub-prix">Prix (DA) *</label>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <input type="number" id="pub-prix" class="form-control" placeholder="Ex: 1500000" style="flex:1;" required>
                        <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-weight:500;">
                            <input type="checkbox" id="pub-negociable"> Négociable
                        </label>
                    </div>
                </div>

                <!-- Wilaya/Commune flex cascade selection -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                    <div class="form-group">
                        <label class="form-label" for="pub-wilaya">Wilaya *</label>
                        <select id="pub-wilaya" class="form-control" required></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="pub-commune">Commune *</label>
                        <select id="pub-commune" class="form-control" disabled required>
                            <option value="" disabled selected>Sélectionner la commune</option>
                        </select>
                    </div>
                </div>

                <!-- Contact phone number -->
                <div class="form-group">
                    <label class="form-label" for="pub-tel">Numéro de téléphone de contact *</label>
                    <input type="tel" id="pub-tel" class="form-control" placeholder="Ex: 0550112233" required>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label class="form-label" for="pub-desc">Description longue *</label>
                    <textarea id="pub-desc" class="form-control" rows="6" placeholder="Décrivez votre objet en détail. Indiquez l'état général, les éventuels défauts, etc." required></textarea>
                </div>

                <!-- Drag & drop pictures container -->
                <div class="form-group" style="margin-top:24px;">
                    <label class="form-label">Photos (Max. 5) *</label>
                    
                    <div class="upload-dashed-box" id="drag-drop-zone">
                        <span class="material-icons" style="font-size:48px; color:var(--text-muted);">collections</span>
                        <span style="font-weight:600; color:var(--secondary);" data-i18n="uploadImages">Glisser-déposer des images ou cliquez pour choisir</span>
                        <input type="file" id="images-input-selector" accept="image/*" multiple style="display:none;">
                    </div>

                    <!-- Images previews target container -->
                    <div id="images-preview-grid"></div>
                </div>

                <!-- Action buttons -->
                <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:40px; border-top:1px solid var(--border); padding-top:24px;">
                    <a href="index.html" class="btn btn-outline">Annuler</a>
                    <button type="submit" id="publishing-submit-btn" class="btn btn-primary" style="height:48px; padding:0 32px;">
                        Publier l'annonce
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Core Javascript Codes load -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Guard
            Auth.requireAuth();

            // Setup cascading geographies selectors
            Search.initLocationDropdowns('pub-wilaya', 'pub-commune');

            // Populate categories elements inside select input
            const catSelect = document.getElementById('pub-categorie');
            CONFIG.CATEGORIES.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                catSelect.appendChild(opt);
            });

            // Set default phone number from logged in user profile
            const activeUser = Auth.getCurrentUser();
            if (activeUser && activeUser.telephone) {
                document.getElementById('pub-tel').value = activeUser.telephone;
            }

            // Bind drag drop compressors engine
            Uploader.init('drag-drop-zone', 'images-input-selector', 'images-preview-grid');

            // Handle publishing submit action
            const form = document.getElementById('publish-ad-form');
            const submitBtn = document.getElementById('publishing-submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const imgList = Uploader.getImages();
                if (imgList.length === 0) {
                    alert("Veuillez sélectionner au moins 1 image pour votre annonce.");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerText = "Téléchargement...";

                const adPayload = {
                    titre: document.getElementById('pub-titre').value.trim(),
                    description: document.getElementById('pub-desc').value.trim(),
                    prix: parseFloat(document.getElementById('pub-prix').value) || 0,
                    categorie_id: parseInt(document.getElementById('pub-categorie').value),
                    region: document.getElementById('pub-wilaya').value,
                    commune: document.getElementById('pub-commune').value,
                    utilisateur_id: activeUser.id,
                    telephone_contact: document.getElementById('pub-tel').value.trim(),
                    images: imgList
                };

                const res = await API.call('creerAnnonce', adPayload);

                if (res.success) {
                    alert("Votre annonce a été publiée avec succès !");
                    window.location.href = `annonce.html?id=${res.id}`;
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Publier l'annonce";
                    alert("Erreur de publication: " + res.error);
                }
            });
        });
    </script>
</body>
</html>
